<style>
    body {
        background: #f3f6fb;
    }

    .survey-container {
        max-width: 900px;
        margin: 40px auto;
        background: white;
        padding: 35px 40px;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .survey-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 20px;
        color: #1f2d3d;
    }

    .survey-subtitle {
        font-size: 18px;
        font-weight: 600;
        margin-top: 30px;
        margin-bottom: 10px;
        color: #2c3e50;
    }

    .survey-text {
        font-size: 16px;
        line-height: 1.7;
        color: #333;
        margin-bottom: 15px;
    }

    .question-box {
        margin-top: 24px;
        margin-bottom: 24px;
        padding: 18px 20px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
    }

    .question-box-single {
        margin-top: 16px;
        margin-bottom: 20px;
        padding: 18px 20px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
    }

    .section-divider {
        margin: 30px 0;
        border: none;
        border-top: 1px solid #dbe2ea;
    }

    .next-btn-box {
        margin-top: 30px;
        text-align: right;
    }

    .scenario-box {
        background: #eef5ff;
        border-left: 5px solid #4a90e2;
        padding: 18px 20px;
        border-radius: 8px;
        margin-bottom: 25px;
    }

    .scenario-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #1d4e89;
    }

    .scenario-text {
        white-space: pre-line;
        font-size: 16px;
        line-height: 1.7;
        color: #2d3748;
    }

    .likert-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        margin-bottom: 20px;
        font-size: 15px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
    }

    .likert-table th,
    .likert-table td {
        border: 1px solid #dbe2ea;
        padding: 12px 10px;
        text-align: center;
        vertical-align: middle;
    }

    .likert-table th {
        background: #eef5ff;
        font-weight: 600;
        color: #2c3e50;
    }

    .likert-question {
        text-align: left !important;
        width: 48%;
        background: #f8fafc;
        font-weight: 500;
        color: #2d3748;
    }

    .likert-scale-note {
        font-size: 14px;
        color: #555;
        margin-bottom: 10px;
    }

    .radio-cell input[type="radio"] {
        transform: scale(1.15);
        cursor: pointer;
    }

    .thankyou-box {
        text-align: center;
        padding: 40px 20px;
    }

    .thankyou-title {
        font-size: 30px;
        font-weight: 700;
        color: #1f2d3d;
        margin-bottom: 20px;
    }

    .thankyou-text {
        font-size: 17px;
        line-height: 1.8;
        color: #444;
        margin-bottom: 14px;
    }

    .otree-form-errors {
        background: #fff1f0;
        border: 1px solid #ffa39e;
        color: #cf1322;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
</style>
